<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<link
	href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap"
	rel="stylesheet">

<style>
* {
	margin: 0;
	padding: 0;
	box-sizing: border-box;
	font-family: 'Poppins', sans-serif;
}

body {
	display: flex;
	height: 100vh;
	background: linear-gradient(135deg, #ff416c, #ff4b2b);
	color: white;
}

/* SIDEBAR */
.sidebar {
	width: 240px;
	background: rgba(0, 0, 0, 0.5);
	padding: 20px;
}

.sidebar h2 {
	text-align: center;
	margin-bottom: 30px;
}

.sidebar a {
	display: block;
	color: white;
	text-decoration: none;
	padding: 12px;
	margin: 8px 0;
	border-radius: 10px;
	transition: 0.3s;
}

.sidebar a:hover {
	background: rgba(255, 255, 255, 0.2);
	transform: translateX(5px);
}

/* MAIN */
.main {
	flex: 1;
	padding: 25px;
	overflow: auto;
}

/* HERO IMAGE */
.hero {
	background:
		url('https://images.unsplash.com/photo-1584515933487-779824d29309')
		no-repeat center/cover;
	height: 180px;
	border-radius: 20px;
	display: flex;
	align-items: center;
	justify-content: center;
	box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
}

.hero h1 {
	background: rgba(0, 0, 0, 0.5);
	padding: 10px 20px;
	border-radius: 10px;
}

/* KPI CARDS */
.cards {
	display: grid;
	grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
	gap: 20px;
	margin-top: 25px;
}

.card {
	padding: 20px;
	border-radius: 20px;
	background: rgba(255, 255, 255, 0.15);
	backdrop-filter: blur(10px);
	text-align: center;
	transition: 0.3s;
}

.card:hover {
	transform: scale(1.05);
}

/* GRAPH SECTION */
.graph {
	margin-top: 30px;
	padding: 20px;
	border-radius: 20px;
	background: rgba(255, 255, 255, 0.15);
}

.bar-container {
	display: flex;
	align-items: flex-end;
	justify-content: space-around;
	height: 200px;
	margin-top: 20px;
}

.bar {
	width: 40px;
	background: white;
	border-radius: 10px;
	transition: 0.3s;
}

.bar:hover {
	background: #ffdada;
}

/* ACTION BUTTONS */
.actions {
	margin-top: 30px;
	text-align: center;
}

.actions button {
	padding: 12px 20px;
	margin: 10px;
	border: none;
	border-radius: 25px;
	background: white;
	color: #ff416c;
	font-weight: bold;
	cursor: pointer;
}

.actions button:hover {
	background: #ffdada;
}
</style>
</head>

<body>

	<!-- SIDEBAR -->
	<div class="sidebar">
		<h2>🩸 Blood Bank</h2>

		<a href="dashboard.html">🏠 Dashboard</a> <a href="searchDonor.html">🔍
			Search</a> <a href="requestBlood.html">🩸 Request</a> <a
			href="viewRequests.html">📋 Requests</a> <a href="addBlood.html">➕
			Add Blood</a> <a href="viewStock.html">📊 Stock</a> <a href="profile.html">👤
			Profile</a> <a href="Logout">🚪 Logout</a>

	</div>

	<!-- MAIN -->
	<div class="main">

		<!-- HERO -->
		<div class="hero">
			<h1>Welcome to Blood Bank Dashboard ❤️</h1>
		</div>

		
		<div class="cards">

			<div class="card">
				<h2>120+</h2>
				<p>Total Donors</p>
			</div>

			<div class="card">
				<h2>45</h2>
				<p>Active Requests</p>
			</div>

			<div class="card">
				<h2>80 Units</h2>
				<p>Total Blood</p>
			</div>

			<div class="card">
				<h2>24/7</h2>
				<p>Service</p>
			</div>

		</div>

		<!-- GRAPH -->
		<div class="graph">
			<h2 style="text-align: center;">Blood Availability</h2>

			<div class="bar-container">

				<div>
					<div class="bar" style="height: 150px;"></div>
					<p>A+</p>
				</div>

				<div>
					<div class="bar" style="height: 100px;"></div>
					<p>B+</p>
				</div>

				<div>
					<div class="bar" style="height: 180px;"></div>
					<p>O+</p>
				</div>

				<div>
					<div class="bar" style="height: 80px;"></div>
					<p>AB+</p>
				</div>

			</div>

		</div>

		<!-- ACTIONS -->
		<div class="actions">

			<button onclick="location.href='searchDonor.html'">Search
				Donor</button>
			<button onclick="location.href='requestBlood.html'">Request
				Blood</button>
			<button onclick="location.href='addBlood.html'">Add Blood</button>

		</div>

	</div>

</body>
</html>
