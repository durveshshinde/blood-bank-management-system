<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Add Blood</title>

<link
	href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
	rel="stylesheet">

<style>

* {
	margin: 0;
	padding: 0;
	box-sizing: border-box;
	font-family: 'Poppins';
}

body {
	display: flex;
	height: 100vh;
	background: linear-gradient(135deg, #ff416c, #ff4b2b);
	color: white;
}

.sidebar {
	width: 240px;
	height: 100vh;
	background: rgba(0, 0, 0, 0.6);
	padding: 25px;
	position: fixed;
}

.sidebar a {
	display: block;
	color: white;
	margin: 10px 0;
	text-decoration: none;
	padding: 10px;
	border-radius: 8px;
}

.sidebar a:hover {
	background: rgba(255, 255, 255, 0.2);
}

.main {
	margin-left: 240px;
	width: 100%;
	display: flex;
	justify-content: center;
	align-items: center;
}

.card {
	width: 400px;
	background: rgba(255, 255, 255, 0.15);
	padding: 30px;
	border-radius: 20px;
	text-align: center;
}

input, select {
	width: 100%;
	padding: 12px;
	margin: 10px 0;
	border-radius: 25px;
	border: none;
}

button {
	width: 100%;
	padding: 12px;
	border: none;
	border-radius: 25px;
	background: white;
	color: #ff416c;
}
</style>
</head>

<body>

	<div class="sidebar">
		<h2>👑 Admin</h2>
		<a href="dashboard.html">Dashboard</a>
	</div>

	<div class="main">
		<div class="card">

			<h2>➕ Add Blood</h2>

			<form>
				<select><option>A+</option>
					<option>B+</option></select> <input type="number" placeholder="Units">
				<button>Add</button>
			</form>

		</div>
	</div>

</body>
</html>
