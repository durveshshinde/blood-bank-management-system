<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Search Donor</title>

<link
	href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
	rel="stylesheet">

<style>
* {
	margin: 0;
	padding: 0;
	box-sizing: border-box;
	font-family: 'Poppins', sans-serif;
}

body {
	display: flex;
	height: 100vh;
	background: linear-gradient(135deg, #ff416c, #ff4b2b);
	color: white;
}

.sidebar {
	width: 240px;
	height: 100vh;
	background: rgba(0, 0, 0, 0.6);
	padding: 25px;
	position: fixed;
}

.sidebar a {
	display: block;
	color: white;
	text-decoration: none;
	padding: 10px;
	margin: 10px 0;
	border-radius: 8px;
}

.sidebar a:hover {
	background: rgba(255, 255, 255, 0.2);
}

.main {
	margin-left: 240px;
	width: 100%;
	display: flex;
	justify-content: center;
	align-items: center;
}

.card {
	width: 400px;
	background: rgba(255, 255, 255, 0.15);
	padding: 30px;
	border-radius: 20px;
	text-align: center;
}

input, select {
	width: 100%;
	padding: 12px;
	margin: 10px 0;
	border-radius: 25px;
	border: none;
}

button {
	width: 100%;
	padding: 12px;
	border: none;
	border-radius: 25px;
	background: white;
	color: #ff416c;
	font-weight: 600;
}
</style>
</head>

<body>

	<div class="sidebar">
		<h2>🩸 Blood Bank</h2>
		<a href="dashboard.html">Dashboard</a> <a href="searchDonor.html">Search</a>
		<a href="requestBlood.html">Request</a> <a href="viewStock.html">Stock</a>
		<a href="Logout">Logout</a>
	</div>

	<div class="main">
		<div class="card">

			<h2>🔍 Search Donor</h2>

			<form action="search" method="post">
				<select name="bloodgroup">
					<option>A+</option>
					<option>B+</option>
					<option>O+</option>
				</select> <input type="text" name="city" placeholder="City">
				<button>Search</button>
			</form>

		</div>
	</div>

</body>
</html>
