<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>
* {
	margin: 0;
	padding: 0;
	box-sizing: border-box;
	font-family: 'Poppins', sans-serif;
}

body {
	display: flex;
	height: 100vh;
	background: linear-gradient(135deg, #1f1c2c, #928dab);
	color: white;
}

/* SIDEBAR */
.sidebar {
	width: 220px;
	background: rgba(0, 0, 0, 0.4);
	padding: 20px;
}

.sidebar h2 {
	margin-bottom: 30px;
}

.sidebar a {
	display: block;
	color: white;
	text-decoration: none;
	margin: 15px 0;
	padding: 10px;
	border-radius: 10px;
	transition: 0.3s;
}

.sidebar a:hover {
	background: rgba(255, 255, 255, 0.2);
}

/* MAIN */
.main {
	flex: 1;
	padding: 30px;
}

.cards {
	display: flex;
	gap: 20px;
	flex-wrap: wrap;
	margin-top: 20px;
}

.card {
	width: 200px;
	padding: 20px;
	background: rgba(255, 255, 255, 0.15);
	border-radius: 20px;
	text-align: center;
}
</style>
</head>

<body>

	<div class="sidebar">
		<h2>👑 Admin Panel</h2>

		<a href="adminDashboard.html">Dashboard</a> <a href="viewDonors.html">View
			Donors</a> <a href="viewRequests.html">View Requests</a> <a
			href="viewStock.html">View Stock</a> <a href="addBlood.html">Add
			Blood</a> <a href="Logout">Logout</a>

	</div>

	<div class="main">

		<h1>Welcome Admin 👑</h1>

		<div class="cards">

			<div class="card">
				<h3>Total Donors</h3>
				<p>--</p>
			</div>

			<div class="card">
				<h3>Total Requests</h3>
				<p>--</p>
			</div>

			<div class="card">
				<h3>Total Blood Units</h3>
				<p>--</p>
			</div>

		</div>

	</div>

</body>
</html>
