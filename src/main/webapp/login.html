<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Blood Bank | Login</title>

<link
	href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap"
	rel="stylesheet">

<style>
* {
	margin: 0;
	padding: 0;
	box-sizing: border-box;
	font-family: 'Poppins', sans-serif;
}

/* BACKGROUND */
body {
	height: 100vh;
	background: linear-gradient(135deg, #ff416c, #ff4b2b);
	display: flex;
	justify-content: center;
	align-items: center;
	color: white;
}

/* SPLIT SCREEN */
.container {
	display: flex;
	width: 800px;
	height: 450px;
	border-radius: 20px;
	overflow: hidden;
	box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
}

/* LEFT SIDE */
.left {
	flex: 1;
	background: rgba(0, 0, 0, 0.3);
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	padding: 20px;
	text-align: center;
}

.left h1 {
	font-size: 32px;
	margin-bottom: 10px;
}

.left p {
	opacity: 0.8;
}

/* RIGHT SIDE (FORM) */
.right {
	flex: 1;
	background: rgba(255, 255, 255, 0.15);
	backdrop-filter: blur(10px);
	display: flex;
	flex-direction: column;
	justify-content: center;
	padding: 30px;
}

.right h2 {
	text-align: center;
	margin-bottom: 20px;
}

input {
	width: 100%;
	padding: 12px;
	margin: 10px 0;
	border: none;
	border-radius: 25px;
	outline: none;
}

button {
	width: 100%;
	padding: 12px;
	border: none;
	border-radius: 25px;
	background: white;
	color: #ff416c;
	font-weight: bold;
	cursor: pointer;
	transition: 0.3s;
}

button:hover {
	background: #ffdada;
}

.link {
	text-align: center;
	margin-top: 10px;
}

.link a {
	color: white;
	text-decoration: none;
}
</style>
</head>

<body>

	<div class="container">

		<!-- LEFT SIDE -->
		<div class="left">
			<h1>🩸 Welcome Back</h1>
			<p>Donate blood, save lives and be a hero.</p>
		</div>

		<!-- RIGHT SIDE -->
		<div class="right">

			<h2>Login</h2>

			<form action="Login" method="post">

				<input type="email" name="email" placeholder="Email Address"
					required> <input type="password" name="password"
					placeholder="Password" required>

				<button type="submit">Login</button>

			</form>

			<div class="link">
				<a href="register.html">New user? Register here</a>
			</div>

		</div>

	</div>

</body>
</html>
